<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Triangle - White with glow -->
  <polygon points="256,60 450,430 62,430" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8" filter="url(#glow)"/>

  <!-- Middle Triangle - Dark blue -->
  <polygon points="256,120 410,400 102,400" fill="#0a1929" stroke="none"/>

  <!-- Inner Bars - White with gradient -->
  <rect x="140" y="200" width="232" height="30" fill="white" rx="4"/>
  <rect x="140" y="260" width="232" height="30" fill="white" rx="4"/>
  <rect x="140" y="320" width="232" height="30" fill="white" rx="4"/>

  <!-- Glow effect on bars -->
  <rect x="140" y="320" width="232" height="30" fill="url(#glowGradient)" rx="4" opacity="0.4" filter="url(#glow)"/>
</svg>