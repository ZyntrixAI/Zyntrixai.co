<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#08090a"/>

  <!-- Main Z shape with tech style -->
  <g>
    <!-- Top horizontal line -->
    <line x1="40" y1="50" x2="130" y2="50" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round"/>

    <!-- Diagonal line -->
    <line x1="130" y1="50" x2="50" y2="150" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round"/>

    <!-- Bottom horizontal line -->
    <line x1="50" y1="150" x2="140" y2="150" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Accent dots -->
  <circle cx="145" cy="45" r="3" fill="#00c8ff" opacity="0.7"/>
  <circle cx="35" cy="155" r="3" fill="#00c8ff" opacity="0.7"/>
</svg>
