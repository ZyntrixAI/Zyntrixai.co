<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#08090a"/>
  <polygon points="256,60 450,430 62,430" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8" filter="url(#logoGlow)"/>
  <polygon points="256,120 410,400 102,400" fill="#0a1929" stroke="none"/>
  <rect x="140" y="200" width="232" height="30" fill="white" rx="4"/>
  <rect x="140" y="260" width="232" height="30" fill="white" rx="4"/>
  <rect x="140" y="320" width="232" height="30" fill="url(#logoGradient)" rx="4" opacity="0.8" filter="url(#logoGlow)"/>
</svg>
