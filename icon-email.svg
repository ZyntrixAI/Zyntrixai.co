<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emailGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
    <filter id="emailGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Envelope body -->
  <rect x="80" y="120" width="352" height="272" fill="none" stroke="url(#emailGradient)" stroke-width="16" rx="20" filter="url(#emailGlow)"/>

  <!-- Envelope flap left -->
  <line x1="80" y1="120" x2="256" y2="260" stroke="url(#emailGradient)" stroke-width="14" stroke-linecap="round" filter="url(#emailGlow)"/>

  <!-- Envelope flap right -->
  <line x1="432" y1="120" x2="256" y2="260" stroke="url(#emailGradient)" stroke-width="14" stroke-linecap="round" filter="url(#emailGlow)"/>

  <!-- Inner envelope line -->
  <line x1="80" y1="120" x2="432" y2="120" stroke="url(#emailGradient)" stroke-width="14" stroke-linecap="round" filter="url(#emailGlow)"/>
</svg>